<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Station Terminal</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --accent-1: #38bdf8;
      --accent-2: #fbbf24;
      --accent-3: #4ade80;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      width: 100%;
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      box-sizing: border-box;
    }

    #clock {
      font-family: monospace;
      font-size: 2rem;
      color: var(--accent-2);
      background: #000;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 2px solid #334155;
    }

    .board-container {
      display: flex;
			flex-wrap: wrap;
      /* grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); */
      gap: 1.5rem;
      width: 90%;
      max-width: 1200px;
      padding-bottom: 2rem;
    }

    .bus-column {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 1.5rem;
      border-top: 6px solid var(--accent-1);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 1rem;
			min-width: 40%;
    }

    .col-1 { border-color: var(--accent-1); }
    .col-2 { border-color: var(--accent-2); }
    .col-3 { border-color: var(--accent-3); }

    .busDetails {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .stop-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 1rem;
      border-radius: 12px;
    }

    .stop-name {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #94a3b8;
    }

    .stop-info {
      display: flex;
      gap: 1rem;
    }

    .stat-box {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .stat-box span { font-size: 0.8rem; text-transform: uppercase; color: #64748b; }
    .stat-box b { font-size: 1.2rem; }

    .arrival-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* THE PROGRESS BAR STYLES */
    .progress-track {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 5px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-1);
      width: 0%; /* Dynamic */
      transition: width 1s linear; /* Smooth movement */
    }

    .col-2 .progress-fill { background: var(--accent-2); }
    .col-3 .progress-fill { background: var(--accent-3); }

    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Platform Departures</h1>
    <div id="clock">00:00:00</div>
  </div>

  <div id="board" class="board-container">
    <!-- Buses rendered here -->
  </div>

  <script>
    // 1. DATA DEFINITION
    const buses = [
      { number: '2002', boarding: 5, depart: 3, totalTime: 300, remaining: 300, colorClass: 'col-1', seats: '40' },
      { number: '405', boarding: 11, depart: 2, totalTime: 600, remaining: 600, colorClass: 'col-2', seats: '40'},
      { number: '10-B', boarding: 0, depart: 14, totalTime: 900, remaining: 900, colorClass: 'col-3', seats: '40' }
    ];

    const board = document.getElementById('board');

    // 2. RENDER FUNCTION
    function renderBoard() {
      board.innerHTML = buses.map(bus => {
        // Calculate progress percentage (how much of the journey is COMPLETE)
        const elapsed = bus.totalTime - bus.remaining;
        let progress = (elapsed / bus.totalTime) * 100;
        
        // Ensure progress is between 0 and 100
        progress = Math.min(Math.max(progress, 0), 100);

        const minutes = Math.floor(bus.remaining / 60);
        const seconds = bus.remaining % 60;
        const timeStr = bus.remaining > 0 ? `${minutes}m ${seconds.toString().padStart(2, '0')}s` : "ARRIVED";

        return `
          <div class="bus-column ${bus.colorClass}">
              <div class="busDetails">
                  <span>BUS ${bus.number}</span>
              </div>

              <div class="stop-card">
                  <span class="stop-name">Grand Avenue</span>
                  <div class="stop-info">
                      <div class="stat-box"><span>Boarding</span><b>${bus.boarding}</b></div>
                      <div class="stat-box"><span>Depart</span><b>${bus.depart}</b></div>
											<div class="stat-box"><span>Seats Available</span><b>${bus.seats - (bus.boarding - bus.depart)}</b></div>
                  </div>
              </div>

              <div class="arrival-footer">
                  <span><span class="pulse"></span> Arriving In</span>
                  <strong>${timeStr}</strong>
                  <div class="progress-track">
                      <div class="progress-fill" style="width: ${progress}%"></div>
                  </div>
              </div>
          </div>
          `;
      }).join('');
    }

    // 3. LOGIC: Update timers every second
    function updateLogic() {
      buses.forEach(bus => {
        if (bus.remaining > 0) {
          bus.remaining--; 
        } else {
          // Loop back for demonstration
          bus.remaining = bus.totalTime;
        }
      });
      renderBoard();
    }

    // 4. CLOCK & INITIALIZATION
    function updateTime() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
    }

    // Start Intervals
    setInterval(updateTime, 1000);
    setInterval(updateLogic, 1000);

    // Initial trigger
    updateTime();
    renderBoard();
  </script>
</body>
</html>
