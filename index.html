<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Station Terminal</title>
  <link rel="stylesheet" href="YAP.css">
</head>

<body>
  <div class="header">
    <h1>Platform Departures</h1>
    <div id="clock">00:00:00</div>
  </div>

  <div id="board" class="board-container">
    <!-- Buses rendered here -->
  </div>
  <footer
  style="
    bottom: 0;
    left: 0;
    width: 100%;
    padding-top: 7px;
    padding-bottom: 7px;
    background-color: #007bff;
    color: white;
    text-align: center;
    font-family: sans-serif;
    font-weight: bold;
    z-index: 1000;
  "
>
  Book your next trip at 
  <a href="https://buservice.netlify.app/book-a-bus" 
     style="color: #ffda05; text-decoration: underline; margin-left: 5px;">
     buservice.netlify.app
  </a>
</footer>
  <script type="module">
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAllBuses, firebaseConfig } from './login.js';

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const board = document.getElementById('board');
    let buses = [];

    // 1. RENDER FUNCTION
    function renderBoard() {
        if (!board) return;
        const now = Date.now();

        board.innerHTML = buses.map((bus,i) => {
            // --- PROGRESS LOGIC BASED ON ETA ---
            const etaTime = new Date(bus.eta).getTime();
            const msLeft = etaTime - now;
            
            // We'll define a journey window (e.g., 10 minutes = 600,000ms) 
            // to show progress from "Far Away" to "Arrived"
            const totalWindow = 600000; 
            let progress = 100 - (msLeft / totalWindow * 100);
            
            // Clamp progress between 0 and 100
            progress = Math.min(Math.max(progress, 0), 100);

            // Format the Countdown String
            let timeStr = "ARRIVED";
            if (msLeft > 0) {
                const totalSecs = Math.floor(msLeft / 1000);
                const mins = Math.floor(totalSecs / 60);
                const secs = totalSecs % 60;
                timeStr = `${mins}m ${secs.toString().padStart(2, '0')}s`;
            }
            const a = (new Date(bus?.eta)).toLocaleTimeString().split(" ");
            const timyThing = `${a[0].split(":")[0]}:${a[0].split(":")[1]} ${a[1]}`
            return `
                <div class="bus-column ${i===0?"col-1":i===1?"col-2":"col-3"}">
                    <div class="busDetails">
                        <span>BUS ${bus.number}</span>
                    </div>
                    <div class="stop-card">
                        <span class="stop-name">${bus?.nextStop}</span>
                        <div class="stat-box"><span>Seats Available</span><b>${bus.seatnumbers}/${bus?.maxSeats}</b></div>
                    </div>
                    <div class="arrival-footer">
                        <span><span class="pulse"></span> Arriving In</span>
                        <strong>${timeStr} (${timyThing})</strong>
                        <div class="progress-track">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // 2. DATA SYNC
    onValue(ref(db, 'buses'), async () => {
        buses = await getAllBuses();
        renderBoard();
    });

    // 3. THE "TICK" (Keep the line moving smoothly every second)
    setInterval(() => {
        renderBoard();
        
        // Update the clock too
        const clock = document.getElementById('clock');
        if (clock) {
            clock.innerText = new Date().toLocaleTimeString([], {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            });
        }
    }, 1000);

</script>
</body>
</html>
