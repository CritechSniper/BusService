<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Tracker</title>
  <link rel="stylesheet" href="css.css">
</head>

<body>
  <main>
    <div class="maincontent">
      <div class="busDetails" style="--bus-name: 'Loading...';">
        BUSES in <span id="busNo"></span>
      </div>
      <div class="stops-container">
        
      </div>
    </div>
  </main>

  <div class="bottom-sheet">
    <div class="sheet-content">
      <!-- <div class="arrival-label">
        <span>Estimated Arrival</span>
        <strong id="copybusDet">In 5 mins</strong>
      </div>
      <button class="refresh-btn">Live Track</button> -->
    </div>
  </div>

  <script>
    document.querySelector('.busDetails').style.setProperty('--bus-name', "'ABU DHABI'");
  </script>
  <script type="module">
    const latest = [];
  const buses = [
    { number: '001', seatnumbers: 45 },
    { number: '002', seatnumbers: 45 },
    { number: '003', seatnumbers: 45 }
  ];

  function getRandomStop() {
    const stops = ["ADNEC", "Abudhabi Airport", "Delma Mall", "Khalifa University Gate", "Mina Port", "Zayed Port", "FUN CITY", "Heritage Village", "Tech Park", "Sheik Zayed Grand Mosque", "Corniche Road", "Abudhabi Bus Depot"];
    return stops[Math.floor(Math.random() * stops.length)];
  }

  function getRandomETA() {
    return `In ${Math.floor(Math.random() * 15) + 1} mins`;
  }

  // Initialize data
  buses.forEach((b) => {
    b.eta = getRandomETA();
    b.nextStop = getRandomStop();
  });

  const container = document.querySelector(".stops-container");

  // Function to draw the UI
  function renderBuses() {
    container.innerHTML = ""; // Clear existing content

    buses.forEach((b) => {
      const details = document.createElement('details');
      if (b.number === latest[0]) details.setAttribute("open",true)
      latest.splice(1,latest.length)
      details.innerHTML = `
        <summary>Bus #${b.number}</summary>
        <div class="stop-info">
          <div class="stat-box center"><span>No.of seats available</span><b>${b.seatnumbers}</b></div>
          <div class="stat-box center"><span>ETA</span><b>${b.eta}</b></div>
          <div class="stat-box center"><span>Next stop</span><b>${b.nextStop}</b></div>
        </div>
        <div class="papa-div">
          <button class="popup-btn book" data-id="${b.number}">Book</button>
          <button class="popup-btn withdraw" data-id="${b.number}">Withdraw</button>
        </div>
      `;
      container.appendChild(details);
    });

    // Re-attach event listeners after rendering
    attachEventListeners();
  }

  function attachEventListeners() {
    document.querySelectorAll('.popup-btn').forEach(btn => {
      btn.onclick = (e) => {
        const busId = btn.getAttribute('data-id');
        const bus = buses.find(b => b.number === busId);
        latest.push(busId)
        if (btn.classList.contains('book')) {
          if (bus.seatnumbers > 0) {
            bus.seatnumbers--;
            renderBuses(); // Refresh UI
          } else {
            alert("Bus full!");
          }
        } else if (btn.classList.contains('withdraw')) {
          // Assuming 45 is the max capacity
          if (bus.seatnumbers < 45) {
            bus.seatnumbers++;
            renderBuses(); // Refresh UI
          }
        }
      };
    });
  }

  // Initial Render
  renderBuses();
</script>
</body>

</html>
